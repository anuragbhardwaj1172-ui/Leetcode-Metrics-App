<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Metric App</title>
    <link rel="stylesheet" href="css_project.css">
</head>
<body>
    <!-- heading
    user_data
    stats -->

    <div class="container">
        <h1>LeetMetric</h1>

        <div class="user-container">
            <p>Enter your username below:</p>
            <div id="user-input-container">
                <input type="text" placeholder="enter username here" id="user-input">
                <button id="search-btn">Search</button>
            </div>

        </div>
        <div class="stats-container">
            <div class="progress">
                <div class="progress-item">
                    <div class="easy-progress circle">
                        <span id="easy-label"></span>
                        <p>Easy</p>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="medium-progress circle">
                        <span id="medium-label"></span>
                        <p>Medium</p>
                    </div>
                </div>
                
                <div class="progress-item">
                    <div class="hard-progress circle">
                        <span id="hard-label"></span>
                        <p>Hard</p>
                    </div>
                </div>
            </div>
            <div class="stats-card">
                <!-- directly populate card here from the JS code -->
            </div>


        </div>
    </div>
    <script src="script_project2.js"></script>

</body>
</html>
